<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Crabitat End-to-End Polling Workflow</title>
  <desc id="desc">Two repos feed three missions in one colony. Three role-based agents poll every 10 seconds for tasks and inbox messages, complete runs, and message each other by role.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 15px; fill: #475569; }

      .section-title { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .label { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #0f172a; }
      .meta { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 13px; fill: #475569; }
      .small { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12px; fill: #64748b; }
      .step { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.3px; fill: #b45309; }

      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .subpanel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .accent { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.6; }
      .repo-a { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.4; }
      .repo-b { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.4; }
      .mission-running { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.3; }
      .mission-pending { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.3; }
      .agent { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
      .task { fill: #fefce8; stroke: #facc15; stroke-width: 1.1; }

      .line { stroke: #94a3b8; stroke-width: 2.2; fill: none; }
      .line-accent { stroke: #f59e0b; stroke-width: 2.4; fill: none; }
      .line-ok { stroke: #16a34a; stroke-width: 2.2; fill: none; }
      .line-msg { stroke: #0ea5e9; stroke-width: 2.2; fill: none; stroke-dasharray: 6 4; }
    </style>

    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" class="bg"/>

  <text x="800" y="46" text-anchor="middle" class="title">Crabitat End-to-End Workflow (Polling Model)</text>
  <text x="800" y="72" text-anchor="middle" class="subtitle">2 repos -> 3 missions -> 3 role agents. No WebSocket required. Agents poll every 10s.</text>

  <!-- Left: Inputs -->
  <rect x="30" y="100" width="300" height="840" rx="16" class="panel"/>
  <text x="180" y="132" text-anchor="middle" class="section-title">Inputs</text>

  <rect x="56" y="160" width="248" height="96" rx="12" class="repo-a"/>
  <text x="180" y="188" text-anchor="middle" class="label">Repo A</text>
  <text x="180" y="209" text-anchor="middle" class="meta">acme/api-service</text>
  <text x="180" y="228" text-anchor="middle" class="small">Issues: #14, #19</text>

  <rect x="56" y="278" width="248" height="96" rx="12" class="repo-b"/>
  <text x="180" y="306" text-anchor="middle" class="label">Repo B</text>
  <text x="180" y="327" text-anchor="middle" class="meta">acme/console-ui</text>
  <text x="180" y="346" text-anchor="middle" class="small">Issues: #7</text>

  <rect x="56" y="408" width="248" height="148" rx="12" class="subpanel"/>
  <text x="180" y="438" text-anchor="middle" class="label">Workflow Template</text>
  <text x="180" y="459" text-anchor="middle" class="meta">backend-feature-v1</text>
  <text x="180" y="480" text-anchor="middle" class="small">plan -> implement -> review</text>
  <text x="180" y="499" text-anchor="middle" class="small">depends_on + conditions</text>
  <text x="180" y="518" text-anchor="middle" class="small">max_retries for fix loops</text>

  <rect x="56" y="584" width="248" height="210" rx="12" class="subpanel"/>
  <text x="180" y="614" text-anchor="middle" class="label">Role Definitions</text>
  <text x="78" y="644" class="meta">- planner  -> prompt_files: plan/*.md</text>
  <text x="78" y="668" class="meta">- developer -> prompt_files: impl/*.md</text>
  <text x="78" y="692" class="meta">- reviewer -> prompt_files: review/*.md</text>
  <text x="78" y="726" class="small">Configured by HTTP CRUD:</text>
  <text x="78" y="746" class="small">/v1/repos, /v1/workflows, /v1/roles</text>

  <!-- Center: Control plane -->
  <rect x="360" y="100" width="810" height="840" rx="16" class="panel"/>
  <text x="765" y="132" text-anchor="middle" class="section-title">Control Plane (HTTP + SQLite)</text>

  <rect x="390" y="160" width="750" height="120" rx="12" class="subpanel"/>
  <text x="765" y="191" text-anchor="middle" class="label">Config APIs</text>
  <text x="765" y="214" text-anchor="middle" class="meta">POST/GET/PATCH /v1/repos  /v1/workflows  /v1/roles</text>
  <text x="765" y="236" text-anchor="middle" class="small">Stores repos, role prompts, workflow steps used for mission expansion</text>

  <rect x="390" y="300" width="360" height="290" rx="12" class="accent"/>
  <text x="570" y="332" text-anchor="middle" class="label">Mission Queue (Colony alpha)</text>

  <rect x="418" y="350" width="304" height="62" rx="10" class="mission-running"/>
  <text x="437" y="373" class="meta">M1  (running)</text>
  <text x="437" y="393" class="small">repo: acme/api-service   issue: #14</text>

  <rect x="418" y="426" width="304" height="62" rx="10" class="mission-pending"/>
  <text x="437" y="449" class="meta">M2  (pending)</text>
  <text x="437" y="469" class="small">repo: acme/api-service   issue: #19</text>

  <rect x="418" y="502" width="304" height="62" rx="10" class="mission-pending"/>
  <text x="437" y="525" class="meta">M3  (pending)</text>
  <text x="437" y="545" class="small">repo: acme/console-ui    issue: #7</text>

  <rect x="780" y="300" width="360" height="290" rx="12" class="subpanel"/>
  <text x="960" y="332" text-anchor="middle" class="label">Task Graph (for active mission M1)</text>

  <rect x="810" y="356" width="300" height="56" rx="9" class="task"/>
  <text x="830" y="381" class="meta">T1 plan      role=planner     status=queued</text>

  <rect x="810" y="430" width="300" height="56" rx="9" class="task"/>
  <text x="830" y="455" class="meta">T2 implement role=developer   depends_on=T1</text>

  <rect x="810" y="504" width="300" height="56" rx="9" class="task"/>
  <text x="830" y="529" class="meta">T3 review    role=reviewer    depends_on=T2</text>

  <line x1="960" y1="412" x2="960" y2="430" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="960" y1="486" x2="960" y2="504" class="line" marker-end="url(#arrow-gray)"/>

  <rect x="390" y="612" width="750" height="126" rx="12" class="subpanel"/>
  <text x="765" y="642" text-anchor="middle" class="label">Agent Polling + Messaging APIs (no WS)</text>
  <text x="420" y="668" class="meta">- POST /v1/crabs/{crab_id}/claim-next         (atomic claim)</text>
  <text x="420" y="690" class="meta">- POST /v1/runs/start, POST /v1/runs/complete</text>
  <text x="420" y="712" class="meta">- GET /v1/crabs/{crab_id}/inbox?after=cursor</text>
  <text x="420" y="734" class="meta">- POST /v1/messages (to_role or to_crab_id), GET /v1/colonies/{colony_id}/directory</text>

  <rect x="390" y="760" width="750" height="152" rx="12" class="subpanel"/>
  <text x="765" y="792" text-anchor="middle" class="label">Execution Loop (every 10s)</text>
  <text x="420" y="820" class="small">1) agent polls claim-next -> 2) receives task matching role -> 3) starts run -> 4) completes run</text>
  <text x="420" y="842" class="small">5) control-plane cascades dependencies and queues next tasks -> 6) next mission activates when current mission closes</text>
  <text x="420" y="864" class="small">7) agents poll inbox and exchange role-targeted questions/replies inside mission thread</text>

  <!-- Right: Agents -->
  <rect x="1195" y="100" width="375" height="840" rx="16" class="panel"/>
  <text x="1382" y="132" text-anchor="middle" class="section-title">Agents (same colony)</text>

  <rect x="1224" y="170" width="317" height="202" rx="12" class="agent"/>
  <text x="1382" y="198" text-anchor="middle" class="label">Agent A: crab-planner</text>
  <text x="1382" y="220" text-anchor="middle" class="meta">role=planner</text>
  <text x="1248" y="248" class="small">poll every 10s:</text>
  <text x="1248" y="268" class="small">POST /claim-next</text>
  <text x="1248" y="288" class="small">GET /inbox</text>
  <text x="1248" y="320" class="small">can ask: to_role=developer</text>
  <text x="1248" y="340" class="small">thread: mission_id + task_id</text>

  <rect x="1224" y="402" width="317" height="202" rx="12" class="agent"/>
  <text x="1382" y="430" text-anchor="middle" class="label">Agent B: crab-dev</text>
  <text x="1382" y="452" text-anchor="middle" class="meta">role=developer</text>
  <text x="1248" y="480" class="small">poll every 10s:</text>
  <text x="1248" y="500" class="small">POST /claim-next</text>
  <text x="1248" y="520" class="small">GET /inbox</text>
  <text x="1248" y="552" class="small">receives plan questions</text>
  <text x="1248" y="572" class="small">can ask: to_role=reviewer</text>

  <rect x="1224" y="634" width="317" height="202" rx="12" class="agent"/>
  <text x="1382" y="662" text-anchor="middle" class="label">Agent C: crab-review</text>
  <text x="1382" y="684" text-anchor="middle" class="meta">role=reviewer</text>
  <text x="1248" y="712" class="small">poll every 10s:</text>
  <text x="1248" y="732" class="small">POST /claim-next</text>
  <text x="1248" y="752" class="small">GET /inbox</text>
  <text x="1248" y="784" class="small">sends PASS/FAIL result</text>
  <text x="1248" y="804" class="small">to drive next step condition</text>

  <!-- Flow arrows: input -> control plane -->
  <line x1="304" y1="208" x2="390" y2="208" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="304" y1="326" x2="390" y2="220" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="304" y1="480" x2="390" y2="236" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="304" y1="690" x2="390" y2="252" class="line" marker-end="url(#arrow-gray)"/>
  <text x="318" y="152" class="step">1) configure repos, workflows, roles</text>

  <!-- Queue -> task graph -->
  <line x1="750" y1="448" x2="780" y2="448" class="line-accent" marker-end="url(#arrow-orange)"/>
  <text x="760" y="430" class="step">2) expand mission to tasks</text>

  <!-- Agent claim-next polls -->
  <line x1="1224" y1="254" x2="1140" y2="670" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="1224" y1="486" x2="1140" y2="682" class="line" marker-end="url(#arrow-gray)"/>
  <line x1="1224" y1="718" x2="1140" y2="694" class="line" marker-end="url(#arrow-gray)"/>
  <text x="1148" y="654" class="step">3) POST claim-next (10s poll)</text>

  <!-- Control plane assignment responses -->
  <line x1="1140" y1="620" x2="1224" y2="236" class="line-accent" marker-end="url(#arrow-orange)"/>
  <line x1="1140" y1="632" x2="1224" y2="468" class="line-accent" marker-end="url(#arrow-orange)"/>
  <line x1="1140" y1="644" x2="1224" y2="700" class="line-accent" marker-end="url(#arrow-orange)"/>
  <text x="988" y="606" class="step">4) returns assigned task by role</text>

  <!-- Run completion -->
  <line x1="1224" y1="332" x2="1140" y2="706" class="line-ok" marker-end="url(#arrow-green)"/>
  <line x1="1224" y1="564" x2="1140" y2="718" class="line-ok" marker-end="url(#arrow-green)"/>
  <line x1="1224" y1="796" x2="1140" y2="730" class="line-ok" marker-end="url(#arrow-green)"/>
  <text x="970" y="750" class="step">5) runs complete -> cascade + next tasks</text>

  <!-- Messaging by role -->
  <line x1="1382" y1="360" x2="1382" y2="402" class="line-msg" marker-end="url(#arrow-blue)"/>
  <line x1="1382" y1="592" x2="1382" y2="634" class="line-msg" marker-end="url(#arrow-blue)"/>
  <text x="1412" y="390" class="step">message to_role</text>
  <text x="1412" y="622" class="step">reply in thread</text>

  <!-- Messaging APIs roundtrip -->
  <line x1="1224" y1="286" x2="1140" y2="714" class="line-msg" marker-end="url(#arrow-blue)"/>
  <line x1="1140" y1="724" x2="1224" y2="532" class="line-msg" marker-end="url(#arrow-blue)"/>
  <text x="1020" y="704" class="step">6) POST /messages + GET /inbox</text>

  <!-- Directory lookup -->
  <line x1="1224" y1="744" x2="1140" y2="736" class="line" marker-end="url(#arrow-gray)"/>
  <text x="980" y="738" class="step">7) GET /directory (who has each role)</text>

  <!-- Footer -->
  <text x="800" y="956" text-anchor="middle" class="subtitle">Key idea: agents are assigned to colony+role; tasks are claimed dynamically; agent-to-agent questions route by role and mission thread.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1c1c1c" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="800" fill="#111111"/>
  <rect width="1200" height="800" fill="url(#hatch)" opacity="0.5"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="800" fill="#0e0e0e"/>
  <line x1="220" y1="0" x2="220" y2="800" stroke="#222" stroke-width="1"/>

  <!-- Logo -->
  <text x="28" y="44" fill="#ece5d8" font-size="18" font-weight="700" letter-spacing="-0.3">crabitat</text>
  <line x1="28" y1="60" x2="196" y2="60" stroke="#222" stroke-width="1"/>

  <!-- Nav -->
  <rect x="12" y="76" width="196" height="36" rx="6" fill="#1a1a1a"/>
  <circle cx="28" cy="94" r="3" fill="#c87a2a"/>
  <text x="42" y="98" fill="#ece5d8" font-size="13" font-weight="500">Repositories</text>
  <text x="196" y="98" fill="#666" font-size="11" font-weight="500" text-anchor="end">3</text>

  <text x="42" y="134" fill="#666" font-size="13">Issues</text>
  <text x="196" y="134" fill="#444" font-size="11" text-anchor="end">12</text>

  <text x="42" y="166" fill="#666" font-size="13">Workflows</text>
  <text x="196" y="166" fill="#444" font-size="11" text-anchor="end">5</text>

  <text x="42" y="198" fill="#666" font-size="13">Missions</text>
  <text x="196" y="198" fill="#444" font-size="11" text-anchor="end">2</text>

  <!-- Page heading -->
  <text x="260" y="52" fill="#ece5d8" font-size="26" font-weight="700" letter-spacing="-0.5">Repositories</text>
  <text x="260" y="74" fill="#777" font-size="13">Onboarded GitHub repos managed by Crabitat</text>

  <!-- Add repo button -->
  <rect x="1060" y="32" width="104" height="34" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1112" y="54" fill="#aaa" font-size="12" font-weight="500" text-anchor="middle">+ Add Repo</text>

  <!-- Divider -->
  <line x1="260" y1="96" x2="1164" y2="96" stroke="#222" stroke-width="1"/>

  <!-- Card 1 -->
  <rect x="260" y="120" width="428" height="172" rx="10" fill="#181818" stroke="#262626" stroke-width="1"/>

  <circle cx="284" cy="148" r="3" fill="#c87a2a"/>
  <text x="296" y="152" fill="#ece5d8" font-size="15" font-weight="600">acme / web-platform</text>

  <text x="284" y="180" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">LOCAL PATH</text>
  <text x="284" y="196" fill="#888" font-size="12">/Users/dev/code/web-platform</text>

  <text x="284" y="222" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">ONBOARDED</text>
  <text x="284" y="238" fill="#888" font-size="12">2 days ago</text>

  <line x1="276" y1="256" x2="672" y2="256" stroke="#222" stroke-width="1"/>
  <text x="284" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">5</tspan> issues</text>
  <text x="370" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">2</tspan> workflows</text>
  <text x="476" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">1</tspan> mission</text>

  <!-- Card 2 -->
  <rect x="712" y="120" width="428" height="172" rx="10" fill="#181818" stroke="#262626" stroke-width="1"/>

  <circle cx="736" cy="148" r="3" fill="#c87a2a"/>
  <text x="748" y="152" fill="#ece5d8" font-size="15" font-weight="600">acme / api-gateway</text>

  <text x="736" y="180" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">LOCAL PATH</text>
  <text x="736" y="196" fill="#888" font-size="12">/Users/dev/code/api-gateway</text>

  <text x="736" y="222" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">ONBOARDED</text>
  <text x="736" y="238" fill="#888" font-size="12">5 days ago</text>

  <line x1="728" y1="256" x2="1124" y2="256" stroke="#222" stroke-width="1"/>
  <text x="736" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">7</tspan> issues</text>
  <text x="822" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">2</tspan> workflows</text>
  <text x="928" y="278" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">0</tspan> missions</text>

  <!-- Card 3 -->
  <rect x="260" y="316" width="428" height="172" rx="10" fill="#181818" stroke="#262626" stroke-width="1"/>

  <circle cx="284" cy="344" r="3" fill="#c87a2a"/>
  <text x="296" y="348" fill="#ece5d8" font-size="15" font-weight="600">acme / docs-site</text>

  <text x="284" y="376" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">LOCAL PATH</text>
  <text x="284" y="392" fill="#888" font-size="12">/Users/dev/code/docs-site</text>

  <text x="284" y="418" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">ONBOARDED</text>
  <text x="284" y="434" fill="#888" font-size="12">1 week ago</text>

  <line x1="276" y1="452" x2="672" y2="452" stroke="#222" stroke-width="1"/>
  <text x="284" y="474" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">0</tspan> issues</text>
  <text x="370" y="474" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">1</tspan> workflow</text>
  <text x="476" y="474" fill="#888" font-size="12"><tspan fill="#ece5d8" font-weight="500">1</tspan> mission</text>

  <!-- Add Repo Modal overlay -->
  <rect x="0" y="530" width="1200" height="270" fill="#111111" opacity="0.9"/>
  <rect x="400" y="540" width="400" height="240" rx="12" fill="#181818" stroke="#262626" stroke-width="1"/>

  <text x="424" y="572" fill="#ece5d8" font-size="16" font-weight="600">Add Repository</text>
  <line x1="424" y1="586" x2="776" y2="586" stroke="#222" stroke-width="1"/>

  <text x="424" y="612" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">OWNER / NAME</text>
  <rect x="424" y="620" width="352" height="32" rx="4" fill="#111" stroke="#262626" stroke-width="1"/>
  <text x="436" y="641" fill="#555" font-size="12">acme / my-new-repo</text>

  <text x="424" y="672" fill="#555" font-size="10" font-weight="600" letter-spacing="0.8">LOCAL PATH</text>
  <rect x="424" y="680" width="352" height="32" rx="4" fill="#111" stroke="#262626" stroke-width="1"/>
  <text x="436" y="701" fill="#555" font-size="12">/Users/dev/code/my-new-repo</text>

  <rect x="680" y="728" width="96" height="32" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="728" y="749" fill="#aaa" font-size="12" font-weight="500" text-anchor="middle">Add Repo</text>
</svg>
[tasks."rust:fmt"]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."rust:clippy"]
description = "Run clippy lints"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks."rust:test"]
description = "Run all tests"
run = "cargo test --workspace"

[tasks."rust:build"]
description = "Build all crates (dev)"
run = "cargo build --workspace"

[tasks."rust:build-release"]
description = "Build all crates (release)"
run = "cargo build --workspace --release"

[tasks."rust:verify"]
description = "Format, lint, test, build"
run = """
cargo fmt --all --check
cargo clippy --workspace --all-targets -- -D warnings
cargo test --workspace
cargo build --workspace
"""

[tasks."rust:run-control-plane"]
description = "Run control-plane server"
run = "cargo run -p crabitat-control-plane"

[tasks."astro:dev"]
description = "Start Astro dev server"
dir = "apps/crabitat-console"
run = "bun run dev"

[tasks."astro:build"]
description = "Build Astro project"
dir = "apps/crabitat-console"
run = "bunx --bun astro build"

[tasks."astro:check"]
description = "Run Astro type checking"
dir = "apps/crabitat-console"
run = "bunx --bun astro check"

[tasks."astro:preview"]
description = "Preview Astro production build"
dir = "apps/crabitat-console"
run = "bun run preview"

[tasks."astro:install"]
description = "Install Astro console dependencies"
dir = "apps/crabitat-console"
run = "bun install"

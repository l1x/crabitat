[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.verify]
description = "Format, lint, test, build"
run = """
cargo fmt --all --check
cargo clippy --workspace --all-targets -- -D warnings
cargo test --workspace
cargo build --workspace
"""

[tasks."run-cp"]
description = "Run control-plane server"
run = "cargo run -p crabitat-control-plane"

[tasks."console-dev"]
description = "Run Astro console in dev mode"
dir = "apps/crabitat-console"
run = "bun run dev"

[tasks."console-build"]
description = "Build Astro console"
dir = "apps/crabitat-console"
run = "bun run build"
